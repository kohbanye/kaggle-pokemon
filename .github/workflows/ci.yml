name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev

      - name: ruff (lint)
        run: uv run ruff check .

      - name: ty (type check)
        run: uv run ty check

      - name: pytest
        run: uv run pytest -q
